<section class="featured-job-area feature-padding" th:fragment="jobs-on-homepage">

	<div class="container">
		<!-- Section Tittle -->

		<div class="row  mt-2">
			<div class="col-lg-12">
				<div class="normal-title">
					<h5> Công việc nổi bật</h5>
				</div>
			</div>

		</div>
		<div class="row justify-content-center">
			<div class="col-xl-6" th:each="job: ${jobs}">
				<!-- single-job-content -->
				<div class="card single-job-items p-2 mt-2">
					<div class="row">
						<div class="col-2 text-center">
							<img th:if="${job.enterprise.getDefaultLogo}==true" th:src="@{'/upload/default.png'}"
								alt="..." width="90">
							<img th:unless="${job.enterprise.getDefaultLogo}==true"
								th:src="@{'/upload/enterprise/'+ ${job.enterprise.getLogoName}}"
								style="width: 70px; height: 70px;" alt="">

						</div>

						<div class="col-10">
							<div class="job-items">
								<div class="job-tittle">
									<div class="job-tittle">
										<div class="d-flex">	
											<span class="job-hot-icon" th:if="${job.hotJob}==true">Hot</span> 
											<span class="job-new-icon"  th:if="${job.urgentJob}==true">Gấp</span>	
											<span><a th:href="@{/job/viewjob/{id}(id=${job.id})}">
												<h6 th:text="${job.title}"></h6>
											</a></span>
										</div>
									</div>
									<a th:href="@{/job/viewEnterprise/{id}(id=${job.enterprise.getId()})}">
										<h6 th:text="${job.enterprise.getName()}">Micrsoft Corp</h6>
									</a>
									<ul>
										<li>
											<i class="icofont-location-pin"></i>
											<span th:text="${job.location.getName()}">Location </span>
										</li>
										<li>
											<i class="icofont-money"></i>
											<span th:text="${job.getSalary()}"> </span>
										</li>
									</ul>
								</div>
								<div class="items-link f-right small" th:data-id="${job.id}"
									th:user-login="${LoggedIn}">
									<a href="#" class="job_save default-border text-black circle arrow"
										title="">Save</a>
									<a href="#" class="job_apply default-border text-black circle arrow"
										title="">Apply</a>
									<!--
									<p class="new-job">New</p>
									<p class="hot-job">Hot</p>
									<a href="#" class="nophs default-border text-black circle arrow"
										title="">Apply</a>
									-->
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>


		<!--Pagination Start  -->
		<div class="pagination-area pt-2 pb-10 text-center" th:if="${totalPage > 1}">
			<div class="container">
				<div class="row">
					<div class="col-xl-12">
						<div class="single-wrap d-flex justify-content-center">
							<nav aria-label="Page navigation example">
								<ul class="pagination justify-content-start">

									<li class="page-item" th:if="${currentPage > 1}">
										<a class="page-link" th:href="@{'?pageNo='+${currentPage-1}}">
											<span class="ti-angle-left"></span></a>
									</li>
									<li class="page-item" th:each="i:${#numbers.sequence(1,totalPage)}"
										th:classappend="${currentPage == i ? 'active':''}">
										<a class="page-link" th:text="${i}" th:href="@{'?pageNo='+${i}}"></a>
									</li>

									<li class="page-item" th:if="${currentPage < totalPage}">
										<a class="page-link" th:href="@{'?pageNo='+${currentPage+1}}"><span
												class="ti-angle-right"></span></a>
									</li>
								</ul>
							</nav>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!--Pagination End  -->


	</div>


</section>
